<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>誰是臥底 Online</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --background: #111322;
      --card: rgba(31, 34, 58, 0.96);
      --card-light: rgba(255, 255, 255, 0.07);
      --primary: #8d78ff;
      --primary-dark: #715be8;
      --secondary: #43d9b8;
      --danger: #ff758f;
      --warning: #ffd76e;
      --text: #ffffff;
      --muted: #aaaec4;
      --border: rgba(255, 255, 255, 0.12);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 22px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
      font-family:
        "Microsoft JhengHei",
        "PingFang TC",
        Arial,
        sans-serif;
      background:
        radial-gradient(
          circle at top left,
          rgba(130, 92, 255, 0.35),
          transparent 36%
        ),
        radial-gradient(
          circle at bottom right,
          rgba(52, 212, 181, 0.22),
          transparent 34%
        ),
        var(--background);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, 470px);
    }

    .card {
      padding: 30px 24px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(18px);
    }

    .hidden {
      display: none !important;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      font-size: 37px;
      background:
        linear-gradient(
          145deg,
          var(--primary),
          #c176f1
        );
      box-shadow:
        0 14px 32px rgba(141, 120, 255, 0.32);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      text-align: center;
      font-size: 29px;
    }

    h2 {
      margin-bottom: 18px;
      font-size: 23px;
    }

    .subtitle {
      margin-bottom: 28px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .field-label {
      display: block;
      margin: 0 0 9px;
      color: #d5d7e4;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-size: 16px;
    }

    input::placeholder {
      color: #7f8298;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow:
        0 0 0 4px rgba(141, 120, 255, 0.14);
    }

    .button {
      width: 100%;
      margin-top: 13px;
      padding: 15px 18px;
      border: 0;
      border-radius: 15px;
      color: white;
      font-weight: 800;
      transition:
        transform 0.15s ease,
        opacity 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:active {
      transform: scale(0.985);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    .button-primary {
      background:
        linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
    }

    .button-secondary {
      background:
        linear-gradient(
          135deg,
          #2cb995,
          var(--secondary)
        );
      color: #071b18;
    }

    .button-danger {
      background: rgba(255, 117, 143, 0.14);
      color: #ff9aae;
      border: 1px solid rgba(255, 117, 143, 0.3);
    }

    .divider {
      margin: 23px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #7f8298;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .join-row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
    }

    .join-row .button {
      margin-top: 0;
    }

    .status {
      min-height: 22px;
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.error {
      color: #ff9aae;
    }

    .status.success {
      color: #63e4c6;
    }

    .room-code-box {
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      text-align: center;
      background: var(--card-light);
    }

    .room-code-label {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 14px;
    }

    .room-code {
      letter-spacing: 7px;
      font-size: 34px;
      font-weight: 900;
    }

    .copy-button {
      margin-top: 10px;
      padding: 8px 14px;
      border: 0;
      border-radius: 999px;
      color: #d9d3ff;
      background: rgba(141, 120, 255, 0.16);
    }

    .lobby-header {
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-count {
      color: var(--muted);
      font-size: 14px;
    }

    .player-list {
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
    }

    .player {
      padding: 14px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: var(--card-light);
    }

    .player-main {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .avatar {
      width: 39px;
      height: 39px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: rgba(141, 120, 255, 0.2);
      font-size: 20px;
    }

    .player-name {
      font-weight: 800;
    }

    .player-you {
      margin-left: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .host-badge {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 207, 85, 0.16);
      color: var(--warning);
      font-size: 12px;
      font-weight: 800;
    }

    .waiting-box {
      padding: 15px;
      margin-bottom: 17px;
      border-radius: 15px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      line-height: 1.6;
    }

    .game-header {
      margin-bottom: 22px;
      text-align: center;
    }

    .round-label {
      display: inline-block;
      padding: 6px 12px;
      margin-bottom: 12px;
      border-radius: 999px;
      color: #d9d3ff;
      background: rgba(141, 120, 255, 0.17);
      font-size: 13px;
      font-weight: 800;
    }

    .secret-card {
      min-height: 300px;
      padding: 26px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(141, 120, 255, 0.35);
      border-radius: 26px;
      text-align: center;
      background:
        linear-gradient(
          145deg,
          rgba(141, 120, 255, 0.2),
          rgba(67, 217, 184, 0.08)
        );
      box-shadow:
        inset 0 0 30px rgba(255, 255, 255, 0.03);
      transition:
        transform 0.2s ease,
        border-color 0.2s ease;
    }

    .secret-card.clickable {
      cursor: pointer;
    }

    .secret-card.clickable:hover {
      transform: translateY(-2px);
      border-color: rgba(141, 120, 255, 0.7);
    }

    .secret-icon {
      margin-bottom: 18px;
      font-size: 55px;
    }

    .secret-title {
      margin-bottom: 10px;
      font-size: 23px;
      font-weight: 900;
    }

    .secret-description {
      max-width: 310px;
      color: var(--muted);
      line-height: 1.7;
    }

    .role-name {
      margin-bottom: 9px;
      font-size: 18px;
      font-weight: 900;
    }

    .role-name.civilian {
      color: #63e4c6;
    }

    .role-name.undercover {
      color: #ff9aae;
    }

    .word-label {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .secret-word {
      margin-top: 5px;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    .game-notice {
      margin-top: 18px;
      padding: 14px;
      border-radius: 15px;
      color: var(--muted);
      text-align: center;
      background: var(--card-light);
      font-size: 14px;
      line-height: 1.7;
    }

    .game-player-list {
      margin-top: 22px;
    }

    .small-player-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .small-player {
      padding: 7px 11px;
      border-radius: 999px;
      color: #d7d9e7;
      background: rgba(255, 255, 255, 0.07);
      font-size: 13px;
    }

    @media (max-width: 420px) {
      .card {
        padding: 27px 19px;
      }

      .join-row {
        grid-template-columns: 1fr;
      }

      .room-code {
        font-size: 30px;
      }

      .secret-word {
        font-size: 35px;
      }
    }
  </style>
</head>

<body>
  <main class="app">

    <!-- 首頁 -->
    <section
      id="homePage"
      class="card"
    >
      <div class="logo">🕵️</div>

      <h1>誰是臥底 Online</h1>

      <p class="subtitle">
        建立房間，邀請最多三位朋友加入，<br>
        看看誰能把謊話說得最像真的。
      </p>

      <label
        class="field-label"
        for="playerName"
      >
        你的暱稱
      </label>

      <input
        id="playerName"
        maxlength="12"
        autocomplete="nickname"
        placeholder="例如：Cathy"
      >

      <button
        id="createRoomButton"
        class="button button-primary"
        type="button"
      >
        建立房間
      </button>

      <div class="divider">
        或加入朋友的房間
      </div>

      <div class="join-row">
        <input
          id="roomCodeInput"
          maxlength="6"
          inputmode="numeric"
          placeholder="輸入六位數房號"
        >

        <button
          id="joinRoomButton"
          class="button button-secondary"
          type="button"
        >
          加入
        </button>
      </div>

      <div
        id="homeStatus"
        class="status"
      >
        正在連接遊戲伺服器……
      </div>
    </section>

    <!-- 等候房 -->
    <section
      id="lobbyPage"
      class="card hidden"
    >
      <div class="room-code-box">
        <div class="room-code-label">
          房間號碼
        </div>

        <div
          id="roomCodeDisplay"
          class="room-code"
        >
          000000
        </div>

        <button
          id="copyRoomButton"
          class="copy-button"
          type="button"
        >
          複製房號
        </button>
      </div>

      <div class="lobby-header">
        <h2 style="margin: 0;">
          房間玩家
        </h2>

        <span
          id="playerCount"
          class="player-count"
        >
          0 / 4
        </span>
      </div>

      <div
        id="playerList"
        class="player-list"
      ></div>

      <div
        id="lobbyMessage"
        class="waiting-box"
      >
        等待其他玩家加入……
      </div>

      <button
        id="startGameButton"
        class="button button-primary hidden"
        type="button"
        disabled
      >
        至少需要 2 位玩家
      </button>

      <button
        id="leaveRoomButton"
        class="button button-danger"
        type="button"
      >
        離開房間
      </button>

      <div
        id="lobbyStatus"
        class="status"
      ></div>
    </section>

    <!-- 遊戲畫面 -->
    <section
      id="gamePage"
      class="card hidden"
    >
      <div class="game-header">
        <div
          id="roundLabel"
          class="round-label"
        >
          第 1 局
        </div>

        <h2 style="margin-bottom: 8px;">
          查看你的秘密詞語
        </h2>

        <p style="color: var(--muted); margin-bottom: 0;">
          注意旁邊的人類，他們極可能沒有禮貌。
        </p>
      </div>

      <div
        id="secretCard"
        class="secret-card clickable"
      >
        <div
          id="secretIcon"
          class="secret-icon"
        >
          🔒
        </div>

        <div
          id="secretTitle"
          class="secret-title"
        >
          點一下查看身份
        </div>

        <div
          id="secretDescription"
          class="secret-description"
        >
          查看時請遮住螢幕，不要讓其他玩家看到你的詞語。
        </div>

        <div
          id="secretResult"
          class="hidden"
        >
          <div
            id="roleName"
            class="role-name"
          ></div>

          <div class="word-label">
            你的詞語
          </div>

          <div
            id="secretWord"
            class="secret-word"
          ></div>
        </div>
      </div>

      <button
        id="hideSecretButton"
        class="button button-secondary hidden"
        type="button"
      >
        隱藏身份與詞語
      </button>

      <div class="game-notice">
        所有人看完詞語後，請依序描述自己的詞，不能直接說出答案。
      </div>

      <div class="game-player-list">
        <div
          id="gamePlayerList"
          class="small-player-list"
        ></div>
      </div>

      <button
        id="gameLeaveButton"
        class="button button-danger"
        type="button"
      >
        離開房間
      </button>

      <div
        id="gameStatus"
        class="status"
      ></div>
    </section>
  </main>

  <script type="module">

    const firebaseConfig = {

      messagingSenderId:

    };

    const wordPairs = [
      {

      },
      {

      {

      }
    ];

    const app =
      initializeApp(firebaseConfig);

    const auth =
      getAuth(app);

    const database =
      getDatabase(app);

    let currentUser = null;
    let currentRoomCode = null;
    let currentRoomData = null;
    let roomUnsubscribe = null;
    let disconnectOperation = null;
    let secretVisible = false;

    const homePage =
      document.getElementById("homePage");

    const lobbyPage =
      document.getElementById("lobbyPage");

    const gamePage =
      document.getElementById("gamePage");

    const playerNameInput =
      document.getElementById("playerName");

    const roomCodeInput =
      document.getElementById("roomCodeInput");

    const createRoomButton =
      document.getElementById("createRoomButton");

    const joinRoomButton =
      document.getElementById("joinRoomButton");

    const homeStatus =
      document.getElementById("homeStatus");

    const roomCodeDisplay =
      document.getElementById("roomCodeDisplay");

    const playerList =
      document.getElementById("playerList");

    const playerCount =
      document.getElementById("playerCount");

    const lobbyMessage =
      document.getElementById("lobbyMessage");

    const startGameButton =
      document.getElementById("startGameButton");

    const leaveRoomButton =
      document.getElementById("leaveRoomButton");

    const copyRoomButton =
      document.getElementById("copyRoomButton");

    const lobbyStatus =
      document.getElementById("lobbyStatus");

    const roundLabel =
      document.getElementById("roundLabel");

    const secretCard =
      document.getElementById("secretCard");

    const secretIcon =
      document.getElementById("secretIcon");

    const secretTitle =
      document.getElementById("secretTitle");

    const secretDescription =
      document.getElementById("secretDescription");

    const secretResult =
      document.getElementById("secretResult");

    const roleName =
      document.getElementById("roleName");

    const secretWord =
      document.getElementById("secretWord");

    const hideSecretButton =
      document.getElementById("hideSecretButton");

    const gamePlayerList =
      document.getElementById("gamePlayerList");

    const gameLeaveButton =
      document.getElementById("gameLeaveButton");

    const gameStatus =
      document.getElementById("gameStatus");

    function setStatus(
      element,
      message,
      type = ""
    ) {
      element.textContent = message;
      element.className =
        `status ${type}`.trim();
    }

    function setHomeButtonsDisabled(disabled) {
      createRoomButton.disabled = disabled;
      joinRoomButton.disabled = disabled;
    }

    function showPage(page) {
      homePage.classList.add("hidden");
      lobbyPage.classList.add("hidden");
      gamePage.classList.add("hidden");

      page.classList.remove("hidden");
    }

    function getPlayerName() {
      return playerNameInput.value.trim();
    }

    function validatePlayerName() {
      const playerName =
        getPlayerName();

      if (!playerName) {
        setStatus(
          homeStatus,
          "請先輸入你的暱稱。",
          "error"
        );

        playerNameInput.focus();
        return null;
      }

      if (playerName.length > 12) {
        setStatus(
          homeStatus,
          "暱稱最多 12 個字。",
          "error"
        );

        return null;
      }

      return playerName;
    }

    function generateRoomCode() {
      return String(
        Math.floor(
          100000 + Math.random() * 900000
        )
      );
    }

    function getRandomItem(array) {
      return array[
        Math.floor(
          Math.random() * array.length
        )
      ];
    }

    async function initializeAuthentication() {
      try {
        const result =
          await signInAnonymously(auth);

        currentUser =
          result.user;

        setStatus(
          homeStatus,
          "連線成功，可以建立或加入房間。",
          "success"
        );

        setHomeButtonsDisabled(false);
      } catch (error) {
        console.error(error);

        setStatus(
          homeStatus,
          `連線失敗：${error.message}`,
          "error"
        );
      }
    }

    async function createRoom() {
      const playerName =
        validatePlayerName();

      if (!playerName || !currentUser) {
        return;
      }

      setHomeButtonsDisabled(true);

      setStatus(
        homeStatus,
        "正在建立房間……"
      );

      try {
        let roomCode = "";
        let roomCreated = false;

        for (
          let attempt = 0;
          attempt < 10;
          attempt++
        ) {
          roomCode =
            generateRoomCode();

          const roomRef =
            ref(
              database,
              `rooms/${roomCode}`
            );

          const snapshot =
            await get(roomRef);

          if (snapshot.exists()) {
            continue;
          }

          await set(
            roomRef,
            {
              hostId:
                currentUser.uid,

              status:
                "waiting",

              maxPlayers:
                4,

              round:
                0,

              createdAt:
                Date.now(),

              players: {
                [currentUser.uid]: {
                  name:
                    playerName,

                  joinedAt:
                    Date.now()
                }
              }
            }
          );

          roomCreated = true;
          break;
        }

        if (!roomCreated) {
          throw new Error(
            "暫時無法產生房號，請再試一次。"
          );
        }

        await enterRoom(roomCode);
      } catch (error) {
        console.error(error);

        setStatus(
          homeStatus,
          `建立失敗：${error.message}`,
          "error"
        );

        setHomeButtonsDisabled(false);
      }
    }

    async function joinRoom() {
      const playerName =
        validatePlayerName();

      if (!playerName || !currentUser) {
        return;
      }

      const roomCode =
        roomCodeInput.value
          .replace(/\D/g, "")
          .slice(0, 6);

      roomCodeInput.value =
        roomCode;

      if (roomCode.length !== 6) {
        setStatus(
          homeStatus,
          "請輸入完整的六位數房號。",
          "error"
        );

        roomCodeInput.focus();
        return;
      }

      setHomeButtonsDisabled(true);

      setStatus(
        homeStatus,
        "正在加入房間……"
      );

      try {
        const roomRef =
          ref(
            database,
            `rooms/${roomCode}`
          );

        const roomSnapshot =
          await get(roomRef);

        if (!roomSnapshot.exists()) {
          throw new Error(
            "找不到這個房間，請確認房號。"
          );
        }

        const roomData =
          roomSnapshot.val();

        if (roomData.status !== "waiting") {
          throw new Error(
            "這個房間已經開始遊戲。"
          );
        }

        const playersRef =
          ref(
            database,
            `rooms/${roomCode}/players`
          );

        let roomWasFull = false;

        const result =
          await runTransaction(
            playersRef,
            function(players) {
              const currentPlayers =
                players || {};

              if (
                currentPlayers[
                  currentUser.uid
                ]
              ) {
                currentPlayers[
                  currentUser.uid
                ].name =
                  playerName;

                return currentPlayers;
              }

              const amount =
                Object.keys(
                  currentPlayers
                ).length;

              if (amount >= 4) {
                roomWasFull = true;
                return;
              }

              currentPlayers[
                currentUser.uid
              ] = {
                name:
                  playerName,

                joinedAt:
                  Date.now()
              };

              return currentPlayers;
            },
            {
              applyLocally: false
            }
          );

        if (!result.committed) {
          if (roomWasFull) {
            throw new Error(
              "房間已滿，最多四人。"
            );
          }

          throw new Error(
            "加入房間時發生同步衝突，請再按一次加入。"
          );
        }

        await enterRoom(roomCode);
      } catch (error) {
        console.error(error);

        setStatus(
          homeStatus,
          `加入失敗：${error.message}`,
          "error"
        );

        setHomeButtonsDisabled(false);
      }
    }

    async function enterRoom(roomCode) {
      currentRoomCode =
        roomCode;

      roomCodeDisplay.textContent =
        roomCode;

      setStatus(lobbyStatus, "");
      setStatus(gameStatus, "");

      if (roomUnsubscribe) {
        roomUnsubscribe();
      }

      const roomRef =
        ref(
          database,
          `rooms/${roomCode}`
        );

      roomUnsubscribe =
        onValue(
          roomRef,
          function(snapshot) {
            if (!snapshot.exists()) {
              handleRoomRemoved();
              return;
            }

            currentRoomData =
              snapshot.val();

            renderRoom(
              currentRoomData
            );
          },
          function(error) {
            console.error(error);

            setStatus(
              lobbyStatus,
              `同步失敗：${error.message}`,
              "error"
            );
          }
        );

      const playerRef =
        ref(
          database,
          `rooms/${roomCode}/players/${currentUser.uid}`
        );

      disconnectOperation =
        onDisconnect(playerRef);

      await disconnectOperation.remove();
    }

    function renderRoom(room) {
      const players =
        room.players || {};

      const playerEntries =
        Object.entries(players)
          .sort(
            function(a, b) {
              return (
                (a[1].joinedAt || 0) -
                (b[1].joinedAt || 0)
              );
            }
          );

      if (!players[currentUser.uid]) {
        resetToHome();
        return;
      }

      if (room.status === "playing") {
        showPage(gamePage);
        renderGame(room, playerEntries);
        return;
      }

      showPage(lobbyPage);

      playerCount.textContent =
        `${playerEntries.length} / 4`;

      playerList.innerHTML = "";

      playerEntries.forEach(
        function([playerId, player]) {
          const isHost =
            playerId === room.hostId;

          const isCurrentPlayer =
            playerId === currentUser.uid;

          const item =
            document.createElement("div");

          item.className =
            "player";

          item.innerHTML = `
            <div class="player-main">
              <div class="avatar">
                ${isHost ? "👑" : "🙂"}
              </div>

              <div>
                <span class="player-name"></span>

                ${
                  isCurrentPlayer
                    ? '<span class="player-you">你</span>'
                    : ""
                }
              </div>
            </div>

            ${
              isHost
                ? '<span class="host-badge">房主</span>'
                : ""
            }
          `;

          item
            .querySelector(".player-name")
            .textContent =
              player.name || "未命名玩家";

          playerList.appendChild(item);
        }
      );

      const isHost =
        room.hostId === currentUser.uid;

      if (playerEntries.length < 2) {
        lobbyMessage.textContent =
          "等待至少一位朋友加入……";
      } else if (playerEntries.length < 4) {
        lobbyMessage.textContent =
          "已可開始遊戲，也可以繼續等待朋友。";
      } else {
        lobbyMessage.textContent =
          "房間已滿，四位玩家均已到齊。";
      }

      if (isHost) {
        startGameButton.classList.remove(
          "hidden"
        );

        if (playerEntries.length >= 2) {
          startGameButton.disabled =
            false;

          startGameButton.textContent =
            "開始遊戲";
        } else {
          startGameButton.disabled =
            true;

          startGameButton.textContent =
            "至少需要 2 位玩家";
        }
      } else {
        startGameButton.classList.add(
          "hidden"
        );
      }
    }

    async function startGame() {
      if (
        !currentRoomCode ||
        !currentUser ||
        !currentRoomData
      ) {
        return;
      }

      if (
        currentRoomData.hostId !==
        currentUser.uid
      ) {
        setStatus(
          lobbyStatus,
          "只有房主可以開始遊戲。",
          "error"
        );

        return;
      }

      const players =
        currentRoomData.players || {};

      const playerIds =
        Object.keys(players);

      if (playerIds.length < 2) {
        setStatus(
          lobbyStatus,
          "至少需要兩位玩家。",
          "error"
        );

        return;
      }

      startGameButton.disabled = true;
      startGameButton.textContent =
        "正在分配身份……";

      try {
        const selectedPair =
          getRandomItem(wordPairs);

        const undercoverId =
          getRandomItem(playerIds);

        const updates = {};

        updates[
          `rooms/${currentRoomCode}/status`
        ] = "playing";

        updates[
          `rooms/${currentRoomCode}/round`
        ] =
          (currentRoomData.round || 0) + 1;

        updates[
          `rooms/${currentRoomCode}/gameStartedAt`
        ] = Date.now();

        updates[
          `rooms/${currentRoomCode}/undercoverId`
        ] = undercoverId;

        playerIds.forEach(
          function(playerId) {
            const isUndercover =
              playerId === undercoverId;

            updates[
              `rooms/${currentRoomCode}/players/${playerId}/role`
            ] =
              isUndercover
                ? "undercover"
                : "civilian";

            updates[
              `rooms/${currentRoomCode}/players/${playerId}/word`
            ] =
              isUndercover
                ? selectedPair.undercover
                : selectedPair.civilian;
          }
        );

        await update(
          ref(database),
          updates
        );
      } catch (error) {
        console.error(error);

        setStatus(
          lobbyStatus,
          `開始失敗：${error.message}`,
          "error"
        );

        startGameButton.disabled = false;
        startGameButton.textContent =
          "開始遊戲";
      }
    }

    function renderGame(
      room,
      playerEntries
    ) {
      const currentPlayer =
        room.players[currentUser.uid];

      roundLabel.textContent =
        `第 ${room.round || 1} 局`;

      gamePlayerList.innerHTML = "";

      playerEntries.forEach(
        function([playerId, player]) {
          const item =
            document.createElement("span");

          item.className =
            "small-player";

          item.textContent =
            playerId === currentUser.uid
              ? `${player.name}（你）`
              : player.name;

          gamePlayerList.appendChild(item);
        }
      );

      if (!secretVisible) {
        showSecretCover();
      } else {
        showSecretResult(currentPlayer);
      }
    }

    function showSecretCover() {
      secretVisible = false;

      secretCard.classList.add(
        "clickable"
      );

      secretIcon.classList.remove(
        "hidden"
      );

      secretTitle.classList.remove(
        "hidden"
      );

      secretDescription.classList.remove(
        "hidden"
      );

      secretResult.classList.add(
        "hidden"
      );

      hideSecretButton.classList.add(
        "hidden"
      );

      secretIcon.textContent =
        "🔒";

      secretTitle.textContent =
        "點一下查看身份";

      secretDescription.textContent =
        "查看時請遮住螢幕，不要讓其他玩家看到你的詞語。";
    }

    function revealSecret() {
      if (
        !currentRoomData ||
        !currentRoomData.players ||
        !currentRoomData.players[
          currentUser.uid
        ]
      ) {
        return;
      }

      secretVisible = true;

      const currentPlayer =
        currentRoomData.players[
          currentUser.uid
        ];

      showSecretResult(currentPlayer);
    }

    function showSecretResult(player) {
      secretCard.classList.remove(
        "clickable"
      );

      secretIcon.classList.add(
        "hidden"
      );

      secretTitle.classList.add(
        "hidden"
      );

      secretDescription.classList.add(
        "hidden"
      );

      secretResult.classList.remove(
        "hidden"
      );

      hideSecretButton.classList.remove(
        "hidden"
      );

      const isUndercover =
        player.role === "undercover";

      roleName.textContent =
        isUndercover
          ? "你是臥底"
          : "你是平民";

      roleName.className =
        `role-name ${
          isUndercover
            ? "undercover"
            : "civilian"
        }`;

      secretWord.textContent =
        player.word || "詞語載入中";
    }

    async function leaveRoom() {
      if (
        !currentRoomCode ||
        !currentUser
      ) {
        return;
      }

      try {
        if (disconnectOperation) {
          await disconnectOperation.cancel();
        }

        const roomRef =
          ref(
            database,
            `rooms/${currentRoomCode}`
          );

        const roomSnapshot =
          await get(roomRef);

        if (roomSnapshot.exists()) {
          const room =
            roomSnapshot.val();

          const playerRef =
            ref(
              database,
              `rooms/${currentRoomCode}/players/${currentUser.uid}`
            );

          await remove(playerRef);

          if (
            room.hostId ===
            currentUser.uid
          ) {
            const latestSnapshot =
              await get(roomRef);

            if (
              latestSnapshot.exists()
            ) {
              const latestRoom =
                latestSnapshot.val();

              const remainingPlayers =
                Object.entries(
                  latestRoom.players || {}
                ).sort(
                  function(a, b) {
                    return (
                      (a[1].joinedAt || 0) -
                      (b[1].joinedAt || 0)
                    );
                  }
                );

              if (
                remainingPlayers.length === 0
              ) {
                await remove(roomRef);
              } else {
                await update(
                  roomRef,
                  {
                    hostId:
                      remainingPlayers[0][0]
                  }
                );
              }
            }
          }
        }
      } catch (error) {
        console.error(error);
      } finally {
        resetToHome();
      }
    }

    function handleRoomRemoved() {
      setStatus(
        lobbyStatus,
        "房間已關閉。",
        "error"
      );

      setStatus(
        gameStatus,
        "房間已關閉。",
        "error"
      );

      setTimeout(
        resetToHome,
        1200
      );
    }

    function resetToHome() {
      if (roomUnsubscribe) {
        roomUnsubscribe();
        roomUnsubscribe = null;
      }

      currentRoomCode = null;
      currentRoomData = null;
      disconnectOperation = null;
      secretVisible = false;

      playerList.innerHTML = "";
      gamePlayerList.innerHTML = "";
      roomCodeInput.value = "";

      showPage(homePage);

      setHomeButtonsDisabled(false);

      setStatus(
        homeStatus,
        "連線成功，可以建立或加入房間。",
        "success"
      );
    }

    async function copyRoomCode() {
      if (!currentRoomCode) {
        return;
      }

      try {
        await navigator.clipboard.writeText(
          currentRoomCode
        );

        copyRoomButton.textContent =
          "已複製";

        setTimeout(
          function() {
            copyRoomButton.textContent =
              "複製房號";
          },
          1500
        );
      } catch (error) {
        setStatus(
          lobbyStatus,
          `房號：${currentRoomCode}`,
          "success"
        );
      }
    }

    roomCodeInput.addEventListener(
      "input",
      function() {
        roomCodeInput.value =
          roomCodeInput.value
            .replace(/\D/g, "")
            .slice(0, 6);
      }
    );

    createRoomButton.addEventListener(
      "click",
      createRoom
    );

    joinRoomButton.addEventListener(
      "click",
      joinRoom
    );

    startGameButton.addEventListener(
      "click",
      startGame
    );

    leaveRoomButton.addEventListener(
      "click",
      leaveRoom
    );

    gameLeaveButton.addEventListener(
      "click",
      leaveRoom
    );

    copyRoomButton.addEventListener(
      "click",
      copyRoomCode
    );

    secretCard.addEventListener(
      "click",
      function() {
        if (
          secretCard.classList.contains(
            "clickable"
          )
        ) {
          revealSecret();
        }
      }
    );

    hideSecretButton.addEventListener(
      "click",
      showSecretCover
    );

    setHomeButtonsDisabled(true);

    initializeAuthentication();
  </script>
</body>
</html>
