<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>誰是臥底 Online｜第五堂多輪版</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg:#101222; --card:#20233c; --soft:rgba(255,255,255,.07);
      --primary:#826cff; --primary2:#6f56e8; --green:#43d9b8;
      --red:#ff758f; --yellow:#ffd76e; --text:#fff; --muted:#adb0c7;
      --border:rgba(255,255,255,.12);
    }
    body {
      margin:0; min-height:100vh; padding:20px 14px; display:flex;
      justify-content:center; align-items:center; color:var(--text);
      font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;
      background:
        radial-gradient(circle at top left,rgba(130,108,255,.35),transparent 35%),
        radial-gradient(circle at bottom right,rgba(67,217,184,.2),transparent 32%),
        var(--bg);
    }
    button,input { font:inherit; }
    button { cursor:pointer; }
    .app { width:min(100%,520px); }
    .card {
      padding:28px 23px; border:1px solid var(--border); border-radius:27px;
      background:rgba(32,35,60,.97); box-shadow:0 22px 65px rgba(0,0,0,.36);
    }
    .hidden { display:none!important; }
    h1,h2,h3,p { margin-top:0; }
    h1 { margin-bottom:8px; text-align:center; font-size:29px; }
    h2 { margin-bottom:16px; }
    .logo {
      width:72px; height:72px; margin:0 auto 16px; display:grid; place-items:center;
      border-radius:22px; font-size:37px;
      background:linear-gradient(145deg,var(--primary),#c176f1);
    }
    .subtitle { color:var(--muted); text-align:center; line-height:1.7; margin-bottom:25px; }
    .label { display:block; margin:0 0 8px; color:#d8daea; font-size:14px; font-weight:800; }
    input {
      width:100%; padding:14px 15px; border:1px solid var(--border);
      border-radius:14px; outline:none; background:var(--soft); color:#fff;
    }
    input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(130,108,255,.14); }
    input::placeholder { color:#81859d; }
    .btn {
      width:100%; margin-top:12px; padding:14px 17px; border:0; border-radius:15px;
      color:#fff; font-weight:900; transition:.15s;
    }
    .btn:hover { transform:translateY(-1px); }
    .btn:active { transform:scale(.985); }
    .btn:disabled { cursor:not-allowed; opacity:.48; transform:none; }
    .primary { background:linear-gradient(135deg,var(--primary),var(--primary2)); }
    .secondary { background:linear-gradient(135deg,#2cb995,var(--green)); color:#071b18; }
    .danger { background:rgba(255,117,143,.13); color:#ff9aae; border:1px solid rgba(255,117,143,.3); }
    .warning { background:linear-gradient(135deg,#efb943,var(--yellow)); color:#382600; }
    .ghost { background:var(--soft); border:1px solid var(--border); color:#e2e3ee; }
    .divider { margin:21px 0; display:flex; align-items:center; gap:10px; color:#80849c; font-size:13px; }
    .divider::before,.divider::after { content:""; flex:1; height:1px; background:var(--border); }
    .join-row { display:grid; grid-template-columns:1fr 115px; gap:10px; }
    .join-row .btn { margin:0; }
    .status { min-height:21px; margin-top:15px; text-align:center; color:var(--muted); font-size:14px; line-height:1.5; }
    .status.error { color:#ff9aae; }
    .status.success { color:#63e4c6; }
    .room-code-box { padding:18px; margin-bottom:21px; border:1px solid var(--border); border-radius:19px; text-align:center; background:var(--soft); }
    .room-code { font-size:34px; font-weight:900; letter-spacing:7px; }
    .small { color:var(--muted); font-size:13px; }
    .copy { margin-top:8px; padding:7px 13px; border:0; border-radius:999px; background:rgba(130,108,255,.16); color:#dcd7ff; }
    .header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:13px; }
    .player-list,.vote-list,.chat-list { display:grid; gap:10px; }
    .player,.vote-btn,.chat-item {
      padding:13px 14px; border:1px solid var(--border); border-radius:15px; background:var(--soft);
    }
    .player { display:flex; justify-content:space-between; align-items:center; }
    .player-main { display:flex; align-items:center; gap:10px; min-width:0; }
    .avatar { width:40px; height:40px; display:grid; place-items:center; border-radius:13px; background:rgba(130,108,255,.2); font-size:20px; flex:none; }
    .player-name { font-weight:900; word-break:break-word; }
    .you { margin-left:5px; color:var(--muted); font-size:12px; }
    .badges { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
    .badge { padding:5px 8px; border-radius:999px; font-size:12px; font-weight:900; }
    .host { color:var(--yellow); background:rgba(255,215,110,.15); }
    .bot { color:#9ce8ff; background:rgba(74,190,255,.14); }
    .ready { color:#63e4c6; background:rgba(67,217,184,.14); }
    .info { padding:14px; margin-top:15px; border-radius:15px; background:var(--soft); color:var(--muted); text-align:center; line-height:1.65; }
    .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .toolbar .btn { margin-top:10px; }
    .round { display:inline-block; padding:6px 11px; margin-bottom:11px; border-radius:999px; color:#dcd7ff; background:rgba(130,108,255,.17); font-size:13px; font-weight:900; }
    .game-head { text-align:center; margin-bottom:20px; }
    .secret-card,.phase-box,.result-card {
      padding:23px 19px; border:1px solid var(--border); border-radius:22px; text-align:center; background:var(--soft);
    }
    .secret-card { min-height:260px; display:flex; flex-direction:column; justify-content:center; align-items:center; border-color:rgba(130,108,255,.35); }
    .secret-card.clickable { cursor:pointer; }
    .big-icon { font-size:52px; margin-bottom:12px; }
    .phase-title { font-size:23px; font-weight:900; margin-bottom:8px; }
    .role { font-size:19px; font-weight:900; margin-bottom:9px; }
    .role.civilian { color:#63e4c6; }
    .role.undercover { color:#ff9aae; }
    .secret-word { font-size:40px; font-weight:900; letter-spacing:3px; margin-top:5px; }
    .speaker { font-size:32px; font-weight:900; margin:13px 0 4px; }
    .order-list { display:flex; flex-wrap:wrap; justify-content:center; gap:7px; margin-top:15px; }
    .order { padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.06); color:var(--muted); font-size:13px; }
    .order.active { color:#fff; background:rgba(130,108,255,.35); font-weight:900; }
    .chat-list { margin-top:16px; }
    .chat-item { text-align:left; }
    .chat-name { font-size:13px; color:#c9c2ff; font-weight:900; margin-bottom:5px; }
    .chat-text { line-height:1.6; word-break:break-word; }
    .chat-current { border-color:rgba(130,108,255,.55); }
    .input-row { display:grid; grid-template-columns:1fr 90px; gap:9px; margin-top:15px; }
    .input-row .btn { margin:0; }
    .vote-btn { width:100%; color:#fff; display:flex; justify-content:space-between; align-items:center; text-align:left; cursor:pointer; }
    .vote-btn:hover { border-color:var(--primary); }
    .vote-btn.selected { border-color:var(--green); background:rgba(67,217,184,.12); }
    .vote-btn:disabled { cursor:not-allowed; opacity:.68; }
    .result-title { font-size:27px; font-weight:900; margin-bottom:8px; }
    .reveal-box { margin-top:16px; padding:15px; border-radius:15px; background:rgba(255,255,255,.06); }
    .reveal-name { color:#ff9aae; font-size:23px; font-weight:900; }
    @media(max-width:430px){
      .card{padding:25px 18px}.join-row,.toolbar{grid-template-columns:1fr}.input-row{grid-template-columns:1fr}
      .room-code{font-size:30px}.secret-word{font-size:34px}
    }
  </style>
</head>
<body>
<main class="app">
  <section id="homePage" class="card">
    <div class="logo">🕵️</div>
    <h1>誰是臥底 Online</h1>
    <p class="subtitle">建立房間、加入朋友與機器人，<br>遠端也能用文字互相懷疑。</p>
    <label class="label" for="playerName">你的暱稱</label>
    <input id="playerName" maxlength="12" autocomplete="nickname" placeholder="例如：Cathy">
    <button id="createRoomButton" class="btn primary" type="button">建立房間</button>
    <div class="divider">或加入朋友的房間</div>
    <div class="join-row">
      <input id="roomCodeInput" maxlength="6" inputmode="numeric" placeholder="輸入六位數房號">
      <button id="joinRoomButton" class="btn secondary" type="button">加入</button>
    </div>
    <div id="homeStatus" class="status">正在連接遊戲伺服器……</div>
  </section>

  <section id="lobbyPage" class="card hidden">
    <div class="room-code-box">
      <div class="small">房間號碼</div>
      <div id="roomCodeDisplay" class="room-code">000000</div>
      <button id="copyRoomButton" class="copy" type="button">複製房號</button>
    </div>
    <div class="header-row">
      <h2 style="margin:0">房間玩家</h2>
      <span id="playerCount" class="small">0 / 4</span>
    </div>
    <div id="playerList" class="player-list"></div>
    <div id="lobbyMessage" class="info">等待其他玩家加入……</div>
    <div id="hostTools" class="toolbar hidden">
      <button id="addBotButton" class="btn ghost" type="button">＋ 加入機器人</button>
      <button id="removeBotButton" class="btn danger" type="button">移除機器人</button>
    </div>
    <button id="startGameButton" class="btn primary hidden" type="button" disabled>至少需要 3 位玩家</button>
    <button id="leaveRoomButton" class="btn danger" type="button">離開房間</button>
    <div id="lobbyStatus" class="status"></div>
  </section>

  <section id="gamePage" class="card hidden">
    <div class="game-head">
      <div id="roundLabel" class="round">第 1 局</div>
      <h2 id="gameTitle" style="margin-bottom:7px">查看你的秘密詞語</h2>
      <p id="gameSubtitle" class="small"></p>
    </div>

    <div id="revealPhase">
      <div id="secretCard" class="secret-card clickable">
        <div id="secretCover">
          <div class="big-icon">🔒</div>
          <div class="phase-title">點一下查看身份</div>
          <div class="small">遮好螢幕。遠端朋友看不到，但你身後的人類未必有禮貌。</div>
        </div>
        <div id="secretResult" class="hidden">
          <div id="roleName" class="role"></div>
          <div class="small">你的詞語</div>
          <div id="secretWord" class="secret-word"></div>
        </div>
      </div>
      <button id="hideSecretButton" class="btn secondary hidden" type="button">隱藏身份與詞語</button>
      <button id="readyButton" class="btn primary" type="button">我已經看完了</button>
      <div id="readyStatus" class="info"></div>
    </div>

    <div id="discussionPhase" class="hidden">
      <div class="phase-box">
        <div class="big-icon">⌨️</div>
        <div class="phase-title">文字描述階段</div>
        <div class="small">現在輪到</div>
        <div id="speakerName" class="speaker"></div>
        <div id="speakerPosition" class="small"></div>
        <div id="speakerOrderList" class="order-list"></div>
      </div>

      <div id="descriptionInputArea" class="input-row hidden">
        <input id="descriptionInput" maxlength="60" placeholder="輸入一句模糊描述，不能直接說出答案">
        <button id="sendDescriptionButton" class="btn secondary" type="button">送出</button>
      </div>
      <div id="botThinking" class="info hidden">機器人正在思考一個不至於自爆的回答……</div>
      <div id="chatList" class="chat-list"></div>
      <div id="discussionStatus" class="info"></div>
      <button id="startVoteButton" class="btn warning hidden" type="button">開始投票</button>
    </div>

    <div id="votingPhase" class="hidden">
      <div id="voteInstruction" class="info" style="margin-top:0">選出你認為是臥底的玩家。</div>
      <div id="voteList" class="vote-list" style="margin-top:15px"></div>
      <div id="voteStatus" class="info"></div>
    </div>

    <div id="tiePhase" class="hidden">
      <div class="phase-box">
        <div class="big-icon">⚖️</div>
        <div class="phase-title">投票平手</div>
        <div id="tieDescription" class="small"></div>
      </div>
      <button id="revoteButton" class="btn warning hidden" type="button">重新投票</button>
    </div>

    <div id="resultPhase" class="hidden">
      <div class="result-card">
        <div id="resultIcon" class="big-icon"></div>
        <div id="resultTitle" class="result-title"></div>
        <div id="resultSubtitle" class="small"></div>
        <div class="reveal-box">
          <div class="small">本局臥底是</div>
          <div id="undercoverName" class="reveal-name"></div>
          <div id="wordReveal" style="margin-top:7px"></div>
        </div>
      </div>
      <button id="continueRoundButton" class="btn secondary hidden" type="button">繼續下一輪描述</button>
      <button id="playAgainButton" class="btn primary hidden" type="button">再來一局</button>
    </div>

    <button id="gameLeaveButton" class="btn danger" type="button">離開房間</button>
    <div id="gameStatus" class="status"></div>
  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import {
  getDatabase, ref, get, set, update, remove, onValue, onDisconnect, runTransaction
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0cfGcTfYxkvmNQT2gUdyL0eIaxJYth3o",
  authDomain: "undercover-room.firebaseapp.com",
  databaseURL: "https://undercover-room-default-rtdb.firebaseio.com",
  projectId: "undercover-room",
  storageBucket: "undercover-room.firebasestorage.app",
  messagingSenderId: "989946004591",
  appId: "1:989946004591:web:a0b214d0514433fb6df99a"
};

const wordPairs = [
  { civilian:"咖啡", undercover:"奶茶", civilianHints:["上班時很多人需要它","有時候味道會偏苦","冷熱都很常見"], undercoverHints:["甜度通常可以調整","很多人會加配料","冷熱都有人喝"] },
  { civilian:"漢堡", undercover:"三明治", civilianHints:["常用手拿著吃","裡面通常夾很多東西","速食店很常見"], undercoverHints:["通常由幾層組成","早餐店很常見","也可以切成三角形"] },
  { civilian:"火鍋", undercover:"麻辣燙", civilianHints:["大家會圍在一起吃","食材會放進湯裡","冬天特別受歡迎"], undercoverHints:["通常是一人一份","可以自己挑食材","味道常常比較重"] },
  { civilian:"冰淇淋", undercover:"霜淇淋", civilianHints:["天氣熱時很受歡迎","有很多種口味","融化後會很麻煩"], undercoverHints:["通常裝在甜筒或杯子裡","口感很柔軟","常從機器直接擠出來"] },
  { civilian:"貓咪", undercover:"兔子", civilianHints:["很多人養在家裡","個性有時很難猜","很會自己整理毛"], undercoverHints:["耳朵特徵很明顯","看起來通常很安靜","喜歡啃食物"] },
  { civilian:"獅子", undercover:"老虎", civilianHints:["常被稱為森林之王","群體生活比較常見","雄性外觀差異明顯"], undercoverHints:["身上有很明顯的花紋","通常單獨行動","也是大型貓科動物"] },
  { civilian:"醫師", undercover:"護理師", civilianHints:["需要做判斷與治療","工作環境常在醫院","值班很辛苦"], undercoverHints:["照護病人的時間很多","工作環境常在醫院","需要處理很多臨床細節"] },
  { civilian:"老師", undercover:"教授", civilianHints:["需要準備教材","每天會面對學生","常常要改作業"], undercoverHints:["通常在大學出現","除了教學也會研究","可能會帶研究生"] },
  { civilian:"秘書", undercover:"助理", civilianHints:["很常處理聯絡與排程","需要同時記很多事情","別人常覺得什麼都能問"], undercoverHints:["協助完成各種工作","事情常常很零碎","可能跟著主管或團隊"] },
  { civilian:"捷運", undercover:"火車", civilianHints:["城市通勤很常用","站與站距離通常較短","尖峰時間很擠"], undercoverHints:["可以跨越比較遠的地區","通常會有不同車種","可能需要先買指定班次"] },
  { civilian:"手機", undercover:"平板", civilianHints:["幾乎每天都帶著","可以打電話","尺寸通常比較方便單手拿"], undercoverHints:["螢幕比較大","常用來看影片或閱讀","不一定會拿來打電話"] },
  { civilian:"電影", undercover:"電視劇", civilianHints:["通常一次看完一個故事","會在戲院上映","長度大約幾個小時"], undercoverHints:["通常分成很多集","故事發展時間比較長","可能每週更新"] },
  { civilian:"口紅", undercover:"唇釉", civilianHints:["通常是固體膏狀","可以直接旋轉出來","補妝很方便"], undercoverHints:["通常用刷頭上色","質地可能比較水潤","瓶身通常像液體彩妝"] },
  { civilian:"鬼屋", undercover:"密室逃脫", civilianHints:["主要目的是嚇人","走到一半常會後悔","裡面可能有人突然出現"], undercoverHints:["需要解很多謎題","通常有時間限制","團隊合作很重要"] },
  { civilian:"蛋餅", undercover:"蔥油餅", civilianHints:["早餐店非常常見","通常會加蛋","可以包不同配料"], undercoverHints:["外層煎得酥脆","蔥味通常很明顯","也常在小吃攤看到"] },
  { civilian:"可樂", undercover:"沙士", civilianHints:["黑色的氣泡飲料","速食店很常見","喝起來有甜味"], undercoverHints:["也是深色氣泡飲料","味道辨識度很高","有些人很喜歡有些人不行"] },
  { civilian:"雨傘", undercover:"雨衣", civilianHints:["下雨時拿在手上","收起來後還是可能滴水","風太大時很脆弱"], undercoverHints:["下雨時穿在身上","騎車時很常使用","收納後可能悶濕"] },
  { civilian:"海邊", undercover:"游泳池", civilianHints:["有沙子和浪","範圍通常很大","天氣會影響體驗"], undercoverHints:["水質通常有人管理","有固定邊界","常有不同深度"] }
];

const BOT_NAMES = ["小臥","阿疑","謎仔","偵探零號"];
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const database = getDatabase(app);

let currentUser = null;
let currentRoomCode = null;
let currentRoomData = null;
let roomUnsubscribe = null;
let disconnectOperation = null;
let secretVisible = false;
let actionTimer = null;
let voteFinalizing = false;

const $ = id => document.getElementById(id);
const pages = [$("homePage"),$("lobbyPage"),$("gamePage")];
const phases = [$("revealPhase"),$("discussionPhase"),$("votingPhase"),$("tiePhase"),$("resultPhase")];

function setStatus(el,message,type=""){ el.textContent=message; el.className=`status ${type}`.trim(); }
function showPage(page){ pages.forEach(p=>p.classList.add("hidden")); page.classList.remove("hidden"); }
function showPhase(phase){ phases.forEach(p=>p.classList.add("hidden")); phase.classList.remove("hidden"); }
function setHomeDisabled(value){ $("createRoomButton").disabled=value; $("joinRoomButton").disabled=value; }
function cleanName(){ return $("playerName").value.trim(); }
function validateName(){
  const name=cleanName();
  if(!name){ setStatus($("homeStatus"),"請先輸入暱稱。","error"); $("playerName").focus(); return null; }
  return name;
}
function roomRef(path=""){ return ref(database,`rooms/${currentRoomCode}${path ? `/${path}` : ""}`); }
function randomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffled(arr){
  const copy=[...arr];
  for(let i=copy.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [copy[i],copy[j]]=[copy[j],copy[i]]; }
  return copy;
}
function sortedPlayers(room){
  return Object.entries(room.players||{}).sort((a,b)=>(a[1].joinedAt||0)-(b[1].joinedAt||0));
}
function humanEntries(room){ return sortedPlayers(room).filter(([,p])=>!p.isBot); }
function botEntries(room){ return sortedPlayers(room).filter(([,p])=>p.isBot); }
function isHost(room){ return room.hostId===currentUser.uid; }
function playerName(room,id){ return room.players?.[id]?.name||"未知玩家"; }
function clearActionTimer(){ if(actionTimer){ clearTimeout(actionTimer); actionTimer=null; } }

async function initAuth(){
  try{
    const result=await signInAnonymously(auth);
    currentUser=result.user;
    setStatus($("homeStatus"),"連線成功，可以建立或加入房間。","success");
    setHomeDisabled(false);
  }catch(error){
    console.error(error);
    setStatus($("homeStatus"),`連線失敗：${error.message}`,"error");
  }
}

async function createRoom(){
  const name=validateName();
  if(!name||!currentUser)return;
  setHomeDisabled(true);
  setStatus($("homeStatus"),"正在建立房間……");
  try{
    let code="",created=false;
    for(let i=0;i<10;i++){
      code=String(Math.floor(100000+Math.random()*900000));
      const target=ref(database,`rooms/${code}`);
      if((await get(target)).exists())continue;
      await set(target,{
        hostId:currentUser.uid,status:"waiting",phase:"waiting",round:0,maxPlayers:4,createdAt:Date.now(),
        players:{[currentUser.uid]:{name,joinedAt:Date.now(),isBot:false}}
      });
      created=true; break;
    }
    if(!created)throw new Error("暫時無法產生房號，請再試一次。");
    await enterRoom(code);
  }catch(error){
    console.error(error); setStatus($("homeStatus"),`建立失敗：${error.message}`,"error"); setHomeDisabled(false);
  }
}

async function joinRoom(){
  const name=validateName();
  if(!name||!currentUser)return;
  const code=$("roomCodeInput").value.replace(/\D/g,"").slice(0,6);
  $("roomCodeInput").value=code;
  if(code.length!==6){ setStatus($("homeStatus"),"請輸入完整六位數房號。","error"); return; }
  setHomeDisabled(true); setStatus($("homeStatus"),"正在加入房間……");
  try{
    const target=ref(database,`rooms/${code}`);
    const snapshot=await get(target);
    if(!snapshot.exists())throw new Error("找不到這個房間。");
    if(snapshot.val().status!=="waiting")throw new Error("遊戲已經開始，不能中途加入。");
    let full=false;
    const result=await runTransaction(ref(database,`rooms/${code}/players`),players=>{
      const current=players||{};
      if(current[currentUser.uid]){ current[currentUser.uid].name=name; return current; }
      if(Object.keys(current).length>=4){ full=true; return; }
      current[currentUser.uid]={name,joinedAt:Date.now(),isBot:false};
      return current;
    });
    if(!result.committed)throw new Error(full?"房間已滿，最多四位。":"加入失敗，請再試一次。");
    await enterRoom(code);
  }catch(error){
    console.error(error); setStatus($("homeStatus"),`加入失敗：${error.message}`,"error"); setHomeDisabled(false);
  }
}

async function enterRoom(code){
  currentRoomCode=code; $("roomCodeDisplay").textContent=code;
  if(roomUnsubscribe)roomUnsubscribe();
  roomUnsubscribe=onValue(ref(database,`rooms/${code}`),snapshot=>{
    if(!snapshot.exists()){ resetHome(); return; }
    currentRoomData=snapshot.val();
    renderRoom(currentRoomData);
  },error=>{
    console.error(error);
    setStatus($("lobbyStatus"),`同步失敗：${error.message}`,"error");
    setStatus($("gameStatus"),`同步失敗：${error.message}`,"error");
  });
  const humanRef=ref(database,`rooms/${code}/players/${currentUser.uid}`);
  disconnectOperation=onDisconnect(humanRef);
  await disconnectOperation.remove();
}

async function startGame(){

  if(ids.length<3)return;
  $("startGameButton").disabled=true;
  try{
    const pair=randomItem(wordPairs);
    const undercoverId=randomItem(ids);
    const order=shuffled(ids);
    const updates={
      status:"playing",phase:"reveal",round:(currentRoomData.round||0)+1,
      undercoverId,civilianWord:pair.civilian,undercoverWord:pair.undercover,
      pairData:pair,descriptionRound:1,speakerOrder:order,speakerIndex:0,messages:null,
      eligibleVoteIds:null,tieIds:null,result:null,lastVoteResult:null,voteFinalized:false
    };
    ids.forEach(id=>{
      const undercover=id===undercoverId;
      updates[`players/${id}/role`]=undercover?"undercover":"civilian";
      updates[`players/${id}/word`]=undercover?pair.undercover:pair.civilian;
      updates[`players/${id}/ready`]=Boolean(currentRoomData.players[id].isBot);
      updates[`players/${id}/vote`]=null;
      updates[`players/${id}/describedRound`]=0;

async function submitDescription(playerId,text,expectedIndex){
  const round=currentRoomData?.descriptionRound||1;
  const lock=await runTransaction(roomRef(`messages/${round}/${playerId}`),value=>{
    if(value)return;
    return {text,createdAt:Date.now()};
  });
  if(!lock.committed)return;
  await update(roomRef(`players/${playerId}`),{describedRound:round});
  const snap=await get(roomRef());
  if(!snap.exists())return;
  const room=snap.val();
  if(room.phase!=="discussion"||(room.speakerIndex||0)!==expectedIndex)return;
  await update(roomRef(),{speakerIndex:expectedIndex+1});
}

function scheduleBotDescription(room,botId){
  const expectedIndex=room.speakerIndex||0;
  const expectedRound=room.descriptionRound||1;
  actionTimer=setTimeout(async()=>{
    const snap=await get(roomRef());
    if(!snap.exists())return;
    const latest=snap.val();
    if(latest.phase!=="discussion"||(latest.descriptionRound||1)!==expectedRound)return;
    const order=latest.speakerOrder||[];
    const bot=latest.players?.[botId];
    if(order[latest.speakerIndex||0]!==botId||(bot?.describedRound||0)>=expectedRound)return;

    const role=bot.role;
    const hints=role==="undercover"
      ? latest.pairData?.undercoverHints
      : latest.pairData?.civilianHints;
    const fallback=[
      "生活中很常見",
      "不同的人會有不同偏好",
      "通常不只一種形式",
      "有時候會和其他東西一起出現",
      "在特定場合特別常見"
    ];

    const used=new Set();
    Object.values(latest.messages||{}).forEach(roundMessages=>{
      Object.values(roundMessages||{}).forEach(message=>used.add(message.text));
    });

    const pool=(hints||fallback);
    const candidates=pool.filter(h=>!used.has(h));
    const text=randomItem(candidates.length?candidates:fallback.filter(h=>!used.has(h)).length
      ? fallback.filter(h=>!used.has(h))
      : fallback);

    await submitDescription(botId,text,expectedIndex);
  },1800+Math.floor(Math.random()*1500));
}

  const players=room.players||{};

  const bots=botEntries(room).map(([id])=>id);
  const me=players[currentUser.uid];
  let eligible=room.eligibleVoteIds ? Object.values(room.eligibleVoteIds) : ids;
  const candidates=eligible.filter(id=>id!==currentUser.uid);
  $("voteInstruction").textContent=room.eligibleVoteIds?"平票重投：只能從平票玩家中選擇。":"選出你認為是臥底的玩家。";
  $("voteList").innerHTML="";
  candidates.forEach(id=>{
    const btn=document.createElement("button"); btn.type="button";
    btn.className=`vote-btn ${me.vote===id?"selected":""}`;
    btn.disabled=Boolean(me.vote);
    btn.innerHTML=`<span></span><span>${me.vote===id?"已投票":"選擇"}</span>`;
    btn.querySelector("span").textContent=`${playerName(room,id)}${players[id].isBot?" 🤖":""}`;
    btn.addEventListener("click",()=>submitVote(id));
    $("voteList").appendChild(btn);
  });
  const voteCount=ids.filter(id=>Boolean(players[id].vote)).length;
  $("voteStatus").textContent=`${voteCount} / ${ids.length} 位玩家已投票`;

  if(isHost(room)){
    bots.forEach(botId=>{
      if(!players[botId].vote)scheduleBotVote(room,botId,eligible);
    });
    if(voteCount===ids.length)finalizeVote(room);

async function submitVote(targetId){

}

function scheduleBotVote(room,botId,eligibleIds){
  actionTimer=setTimeout(async()=>{
    const snap=await get(roomRef());
    if(!snap.exists())return;
    const latest=snap.val();
    if(latest.phase!=="voting"||latest.players?.[botId]?.vote)return;
    const candidates=(latest.eligibleVoteIds?Object.values(latest.eligibleVoteIds):Object.keys(latest.players||{}))
      .filter(id=>id!==botId);
    if(!candidates.length)return;
    const messages=latest.messages?.[latest.descriptionRound||1]||{};
    const botWord=latest.players[botId].word;
    let scored=candidates.map(id=>{
      let score=Math.random();
      const text=messages[id]?.text||"";
      if(text&&botWord&&text.includes(botWord))score+=2;
      if(latest.players[id].isBot)score-=.15;
      return {id,score};
    }).sort((a,b)=>b.score-a.score);
    await update(roomRef(`players/${botId}`),{vote:scored[0].id});
  },1400+Math.floor(Math.random()*1300));
}

async function finalizeVote(room){
  if(voteFinalizing)return;
  voteFinalizing=true;
  try{
    const lock=await runTransaction(roomRef("voteFinalized"),value=>value===true?undefined:true);
    if(!lock.committed)return;

    const counts={};
    Object.values(room.players||{}).forEach(player=>{
      if(player.vote)counts[player.vote]=(counts[player.vote]||0)+1;
    });
    const values=Object.values(counts);
    if(!values.length){
      await update(roomRef(),{voteFinalized:false});
      return;
    }

    const max=Math.max(...values);
    const top=Object.keys(counts).filter(id=>counts[id]===max);

    if(top.length>1){
      await update(roomRef(),{
        phase:"tie",
        tieIds:top,
        voteFinalized:false
      });
      return;
    }

    const guessedId=top[0];
    const caught=guessedId===room.undercoverId;

    await update(roomRef(),{
      phase:"result",
      voteFinalized:false,
      lastVoteResult:{
        guessedId,
        caught,
        descriptionRound:room.descriptionRound||1,
        voteCount:max
      },
      result:caught
        ? {eliminatedId:guessedId,winner:"civilian"}
        : null
    });
  }catch(error){
    console.error(error);
    await update(roomRef(),{voteFinalized:false});
  }finally{
    voteFinalizing=false;
  }
}

async function leaveRoom(){
  if(!currentRoomCode||!currentUser)return;
  try{
    clearActionTimer();
    if(disconnectOperation)await disconnectOperation.cancel();
    const target=roomRef();
    const snapshot=await get(target);
    if(snapshot.exists()){
      const room=snapshot.val();
      await remove(roomRef(`players/${currentUser.uid}`));
      if(room.hostId===currentUser.uid){
        const latest=await get(target);
        if(latest.exists()){
          const humans=humanEntries(latest.val());
          if(!humans.length)await remove(target);
          else await update(target,{hostId:humans[0][0]});
        }
      }
    }
  }catch(error){ console.error(error); }
  finally{ resetHome(); }
}

function resetHome(){
  clearActionTimer();
  if(roomUnsubscribe){ roomUnsubscribe(); roomUnsubscribe=null; }
  currentRoomCode=null; currentRoomData=null; disconnectOperation=null; secretVisible=false; voteFinalizing=false;
  $("roomCodeInput").value=""; $("playerList").innerHTML=""; $("chatList").innerHTML=""; $("voteList").innerHTML="";
  showPage($("homePage")); setHomeDisabled(false);
  setStatus($("homeStatus"),"連線成功，可以建立或加入房間。","success");
}

async function copyCode(){
  if(!currentRoomCode)return;
  try{
    await navigator.clipboard.writeText(currentRoomCode);
    $("copyRoomButton").textContent="已複製";
    setTimeout(()=>$("copyRoomButton").textContent="複製房號",1400);
  }catch{ setStatus($("lobbyStatus"),`房號：${currentRoomCode}`,"success"); }
}

$("roomCodeInput").addEventListener("input",()=>{$("roomCodeInput").value=$("roomCodeInput").value.replace(/\D/g,"").slice(0,6);});
$("createRoomButton").addEventListener("click",createRoom);
$("joinRoomButton").addEventListener("click",joinRoom);
$("copyRoomButton").addEventListener("click",copyCode);
$("addBotButton").addEventListener("click",addBot);
$("removeBotButton").addEventListener("click",removeBot);
$("startGameButton").addEventListener("click",startGame);
$("leaveRoomButton").addEventListener("click",leaveRoom);
$("gameLeaveButton").addEventListener("click",leaveRoom);
$("secretCard").addEventListener("click",()=>{
  if(!$("secretCard").classList.contains("clickable"))return;
  showSecret(currentRoomData.players[currentUser.uid]);
});
$("hideSecretButton").addEventListener("click",hideSecret);
$("readyButton").addEventListener("click",markReady);
$("sendDescriptionButton").addEventListener("click",sendDescription);
$("descriptionInput").addEventListener("keydown",event=>{ if(event.key==="Enter")sendDescription(); });
$("startVoteButton").addEventListener("click",beginVoting);
$("revoteButton").addEventListener("click",beginRevote);
$("continueRoundButton").addEventListener("click",continueNextRound);
$("playAgainButton").addEventListener("click",playAgain);

setHomeDisabled(true);
initAuth();
</script>
</body>
