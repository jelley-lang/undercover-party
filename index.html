<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>誰是臥底 Online</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --background: #111322;
      --card: rgba(31, 34, 58, 0.96);
      --card-light: rgba(255, 255, 255, 0.07);
      --primary: #8d78ff;
      --primary-dark: #7059e8;
      --secondary: #43d9b8;
      --danger: #ff758f;
      --warning: #ffd76e;
      --text: #ffffff;
      --muted: #aaaec4;
      --border: rgba(255, 255, 255, 0.12);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 22px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
      font-family:
        "Microsoft JhengHei",
        "PingFang TC",
        Arial,
        sans-serif;
      background:
        radial-gradient(
          circle at top left,
          rgba(130, 92, 255, 0.35),
          transparent 36%
        ),
        radial-gradient(
          circle at bottom right,
          rgba(52, 212, 181, 0.22),
          transparent 34%
        ),
        var(--background);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, 490px);
    }

    .card {
      padding: 30px 24px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(18px);
    }

    .hidden {
      display: none !important;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      font-size: 37px;
      background:
        linear-gradient(
          145deg,
          var(--primary),
          #c176f1
        );
      box-shadow:
        0 14px 32px rgba(141, 120, 255, 0.32);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      text-align: center;
      font-size: 29px;
    }

    h2 {
      margin-bottom: 18px;
      font-size: 23px;
    }

    .subtitle {
      margin-bottom: 28px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .field-label {
      display: block;
      margin: 0 0 9px;
      color: #d5d7e4;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid var(--border);
      border-radius: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-size: 16px;
    }

    input::placeholder {
      color: #7f8298;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow:
        0 0 0 4px rgba(141, 120, 255, 0.14);
    }

    .button {
      width: 100%;
      margin-top: 13px;
      padding: 15px 18px;
      border: 0;
      border-radius: 15px;
      color: white;
      font-weight: 800;
      transition:
        transform 0.15s ease,
        opacity 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button:active {
      transform: scale(0.985);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    .button-primary {
      background:
        linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
    }

    .button-secondary {
      background:
        linear-gradient(
          135deg,
          #2cb995,
          var(--secondary)
        );
      color: #071b18;
    }

    .button-danger {
      background: rgba(255, 117, 143, 0.14);
      color: #ff9aae;
      border: 1px solid rgba(255, 117, 143, 0.3);
    }

    .button-warning {
      background:
        linear-gradient(
          135deg,
          #f0b943,
          #ffd76e
        );
      color: #332200;
    }

    .divider {
      margin: 23px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #7f8298;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .join-row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
    }

    .join-row .button {
      margin-top: 0;
    }

    .status {
      min-height: 22px;
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.error {
      color: #ff9aae;
    }

    .status.success {
      color: #63e4c6;
    }

    .room-code-box {
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      text-align: center;
      background: var(--card-light);
    }

    .room-code-label {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 14px;
    }

    .room-code {
      letter-spacing: 7px;
      font-size: 34px;
      font-weight: 900;
    }

    .copy-button {
      margin-top: 10px;
      padding: 8px 14px;
      border: 0;
      border-radius: 999px;
      color: #d9d3ff;
      background: rgba(141, 120, 255, 0.16);
    }

    .section-header {
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-count {
      color: var(--muted);
      font-size: 14px;
    }

    .player-list {
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
    }

    .player {
      padding: 14px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: var(--card-light);
    }

    .player-main {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .avatar {
      width: 39px;
      height: 39px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: rgba(141, 120, 255, 0.2);
      font-size: 20px;
    }

    .player-name {
      font-weight: 800;
    }

    .player-you {
      margin-left: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .host-badge,
    .ready-badge,
    .voted-badge {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .host-badge {
      background: rgba(255, 207, 85, 0.16);
      color: var(--warning);
    }

    .ready-badge {
      background: rgba(67, 217, 184, 0.15);
      color: #63e4c6;
    }

    .voted-badge {
      background: rgba(141, 120, 255, 0.16);
      color: #c9c0ff;
    }

    .info-box {
      padding: 15px;
      margin-bottom: 17px;
      border-radius: 15px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      line-height: 1.7;
    }

    .round-label {
      display: inline-block;
      padding: 6px 12px;
      margin-bottom: 12px;
      border-radius: 999px;
      color: #d9d3ff;
      background: rgba(141, 120, 255, 0.17);
      font-size: 13px;
      font-weight: 800;
    }

    .game-header {
      margin-bottom: 22px;
      text-align: center;
    }

    .secret-card {
      min-height: 290px;
      padding: 26px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(141, 120, 255, 0.35);
      border-radius: 26px;
      text-align: center;
      background:
        linear-gradient(
          145deg,
          rgba(141, 120, 255, 0.2),
          rgba(67, 217, 184, 0.08)
        );
    }

    .secret-card.clickable {
      cursor: pointer;
    }

    .secret-icon {
      margin-bottom: 18px;
      font-size: 55px;
    }

    .secret-title {
      margin-bottom: 10px;
      font-size: 23px;
      font-weight: 900;
    }

    .secret-description {
      max-width: 310px;
      color: var(--muted);
      line-height: 1.7;
    }

    .role-name {
      margin-bottom: 9px;
      font-size: 18px;
      font-weight: 900;
    }

    .role-name.civilian {
      color: #63e4c6;
    }

    .role-name.undercover {
      color: #ff9aae;
    }

    .word-label {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .secret-word {
      margin-top: 5px;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    .phase-box {
      padding: 24px 20px;
      border: 1px solid var(--border);
      border-radius: 22px;
      text-align: center;
      background: var(--card-light);
    }

    .phase-icon {
      margin-bottom: 12px;
      font-size: 48px;
    }

    .phase-title {
      margin-bottom: 8px;
      font-size: 23px;
      font-weight: 900;
    }

    .phase-description {
      color: var(--muted);
      line-height: 1.7;
    }

    .speaker-name {
      margin: 17px 0 6px;
      color: #ffffff;
      font-size: 34px;
      font-weight: 900;
    }

    .speaker-position {
      color: #c9c0ff;
      font-size: 14px;
    }

    .order-list {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .order-item {
      padding: 8px 11px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      font-size: 13px;
    }

    .order-item.active {
      color: white;
      background: rgba(141, 120, 255, 0.35);
      font-weight: 800;
    }

    .vote-list {
      display: grid;
      gap: 11px;
    }

    .vote-button {
      width: 100%;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 16px;
      color: white;
      background: var(--card-light);
      text-align: left;
    }

    .vote-button:hover {
      border-color: var(--primary);
      background: rgba(141, 120, 255, 0.15);
    }

    .vote-button.selected {
      border-color: var(--secondary);
      background: rgba(67, 217, 184, 0.13);
    }

    .vote-button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .result-card {
      padding: 25px 20px;
      border: 1px solid var(--border);
      border-radius: 22px;
      text-align: center;
      background: var(--card-light);
    }

    .result-icon {
      margin-bottom: 12px;
      font-size: 58px;
    }

    .result-title {
      margin-bottom: 11px;
      font-size: 27px;
      font-weight: 900;
    }

    .result-subtitle {
      color: var(--muted);
      line-height: 1.7;
    }

    .reveal-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .reveal-name {
      color: #ff9aae;
      font-size: 24px;
      font-weight: 900;
    }

    .reveal-word {
      margin-top: 7px;
      color: #ffffff;
      font-size: 17px;
    }

    @media (max-width: 420px) {
      .card {
        padding: 27px 19px;
      }

      .join-row {
        grid-template-columns: 1fr;
      }

      .room-code {
        font-size: 30px;
      }

      .secret-word {
        font-size: 35px;
      }
    }
  </style>
</head>

<body>
  <main class="app">

    <!-- 首頁 -->
    <section
      id="homePage"
      class="card"
    >
      <div class="logo">🕵️</div>

      <h1>誰是臥底 Online</h1>

      <p class="subtitle">
        建立房間，邀請朋友加入，<br>
        看看誰能把謊話說得最像真的。
      </p>

      <label
        class="field-label"
        for="playerName"
      >
        你的暱稱
      </label>

      <input
        id="playerName"
        maxlength="12"
        autocomplete="nickname"
        placeholder="例如：Cathy"
      >

      <button
        id="createRoomButton"
        class="button button-primary"
        type="button"
      >
        建立房間
      </button>

      <div class="divider">
        或加入朋友的房間
      </div>

      <div class="join-row">
        <input
          id="roomCodeInput"
          maxlength="6"
          inputmode="numeric"
          placeholder="輸入六位數房號"
        >

        <button
          id="joinRoomButton"
          class="button button-secondary"
          type="button"
        >
          加入
        </button>
      </div>

      <div
        id="homeStatus"
        class="status"
      >
        正在連接遊戲伺服器……
      </div>
    </section>

    <!-- 等候房 -->
    <section
      id="lobbyPage"
      class="card hidden"
    >
      <div class="room-code-box">
        <div class="room-code-label">
          房間號碼
        </div>

        <div
          id="roomCodeDisplay"
          class="room-code"
        >
          000000
        </div>

        <button
          id="copyRoomButton"
          class="copy-button"
          type="button"
        >
          複製房號
        </button>
      </div>

      <div class="section-header">
        <h2 style="margin: 0;">
          房間玩家
        </h2>

        <span
          id="playerCount"
          class="player-count"
        >
          0 / 4
        </span>
      </div>

      <div
        id="playerList"
        class="player-list"
      ></div>

      <div
        id="lobbyMessage"
        class="info-box"
      >
        等待其他玩家加入……
      </div>

      <button
        id="startGameButton"
        class="button button-primary hidden"
        type="button"
        disabled
      >
        至少需要 2 位玩家
      </button>

      <button
        id="leaveRoomButton"
        class="button button-danger"
        type="button"
      >
        離開房間
      </button>

      <div
        id="lobbyStatus"
        class="status"
      ></div>
    </section>

    <!-- 遊戲畫面 -->
    <section
      id="gamePage"
      class="card hidden"
    >
      <div class="game-header">
        <div
          id="roundLabel"
          class="round-label"
        >
          第 1 局
        </div>

        <h2
          id="gameTitle"
          style="margin-bottom: 8px;"
        >
          查看你的秘密詞語
        </h2>

        <p
          id="gameSubtitle"
          style="color: var(--muted); margin-bottom: 0;"
        ></p>
      </div>

      <!-- 查看身份 -->
      <div id="revealPhase">
        <div
          id="secretCard"
          class="secret-card clickable"
        >
          <div
            id="secretCover"
          >
            <div class="secret-icon">
              🔒
            </div>

            <div class="secret-title">
              點一下查看身份
            </div>

            <div class="secret-description">
              請遮住螢幕，避免旁邊那些毫無界線感的人偷看。
            </div>
          </div>

          <div
            id="secretResult"
            class="hidden"
          >
            <div
              id="roleName"
              class="role-name"
            ></div>

            <div class="word-label">
              你的詞語
            </div>

            <div
              id="secretWord"
              class="secret-word"
            ></div>
          </div>
        </div>

        <button
          id="hideSecretButton"
          class="button button-secondary hidden"
          type="button"
        >
          隱藏身份與詞語
        </button>

        <button
          id="readyButton"
          class="button button-primary"
          type="button"
        >
          我已經看完了
        </button>

        <div
          id="readyStatus"
          class="info-box"
          style="margin-top: 17px;"
        ></div>
      </div>

      <!-- 描述階段 -->
      <div
        id="discussionPhase"
        class="hidden"
      >
        <div class="phase-box">
          <div class="phase-icon">
            🎤
          </div>

          <div class="phase-title">
            現在請這位玩家描述
          </div>

          <div
            id="speakerName"
            class="speaker-name"
          ></div>

          <div
            id="speakerPosition"
            class="speaker-position"
          ></div>

          <div
            id="speakerOrderList"
            class="order-list"
          ></div>
        </div>

        <button
          id="nextSpeakerButton"
          class="button button-primary hidden"
          type="button"
        >
          下一位玩家
        </button>

        <button
          id="startVoteButton"
          class="button button-warning hidden"
          type="button"
        >
          開始投票
        </button>

        <div class="info-box">
          描述時不能直接說出自己的詞，也不要演得像剛收到奧斯卡。
        </div>
      </div>

      <!-- 投票階段 -->
      <div
        id="votingPhase"
        class="hidden"
      >
        <div
          id="voteInstruction"
          class="info-box"
        >
          選出你認為是臥底的玩家。
        </div>

        <div
          id="voteList"
          class="vote-list"
        ></div>

        <div
          id="voteStatus"
          class="info-box"
          style="margin-top: 17px;"
        ></div>
      </div>

      <!-- 平票 -->
      <div
        id="tiePhase"
        class="hidden"
      >
        <div class="phase-box">
          <div class="phase-icon">
            ⚖️
          </div>

          <div class="phase-title">
            投票結果平手
          </div>

          <div
            id="tieDescription"
            class="phase-description"
          ></div>
        </div>

        <button
          id="revoteButton"
          class="button button-warning hidden"
          type="button"
        >
          進行重新投票
        </button>
      </div>

      <!-- 結果 -->
      <div
        id="resultPhase"
        class="hidden"
      >
        <div class="result-card">
          <div
            id="resultIcon"
            class="result-icon"
          ></div>

          <div
            id="resultTitle"
            class="result-title"
          ></div>

          <div
            id="resultSubtitle"
            class="result-subtitle"
          ></div>

          <div class="reveal-box">
            <div>
              本局臥底是
            </div>

            <div
              id="undercoverName"
              class="reveal-name"
            ></div>

            <div
              id="wordReveal"
              class="reveal-word"
            ></div>
          </div>
        </div>

        <button
          id="playAgainButton"
          class="button button-primary hidden"
          type="button"
        >
          再來一局
        </button>
      </div>

      <button
        id="gameLeaveButton"
        class="button button-danger"
        type="button"
      >
        離開房間
      </button>

      <div
        id="gameStatus"
        class="status"
      ></div>
    </section>
  </main>

    function getPlayerName() {

    function validatePlayerName() {
      const playerName =
        getPlayerName();

      if (!playerName) {
        setStatus(
          homeStatus,
          "請先輸入你的暱稱。",
          "error"
        );

        playerNameInput.focus();
        return null;
      }

      return playerName;
    }

    function generateRoomCode() {
      return String(
        Math.floor(
          100000 + Math.random() * 900000
        )
      );
    }

    function getRandomItem(array) {
      return array[
        Math.floor(
          Math.random() * array.length
        )
      ];
    }

    function shuffleArray(array) {
      const result = [...array];

      for (
        let index = result.length - 1;
        index > 0;
        index--
      ) {
        const randomIndex =
          Math.floor(
            Math.random() * (index + 1)
          );

        [
          result[index],
          result[randomIndex]
        ] = [
          result[randomIndex],
          result[index]
        ];
      }

      return result;
    }

    function getSortedPlayers(room) {
      return Object.entries(
        room.players || {}
      ).sort(
        function(a, b) {
          return (
            (a[1].joinedAt || 0) -
            (b[1].joinedAt || 0)
          );
        }
      );
    }

    function getPlayerDisplayName(
      room,
      playerId
    ) {
      return (
        room.players?.[playerId]?.name ||
        "未知玩家"
      );
    }

    function isCurrentUserHost(room) {
      return (
        room.hostId === currentUser.uid

    async function initializeAuthentication() {
      try {
        const result =
          await signInAnonymously(auth);

        currentUser =
          result.user;

          "success"
        );

        setHomeButtonsDisabled(false);
      } catch (error) {

        setStatus(

        );
      }
    }

    async function createRoom() {
      const playerName =
        validatePlayerName();

      if (!playerName || !currentUser) {
        return;
      }

      setHomeButtonsDisabled(true);

      try {
        let roomCode = "";
        let created = false;

        for (
          let attempt = 0;
          attempt < 10;
          attempt++
        ) {
          roomCode =
            generateRoomCode();

          const roomRef =
            ref(
              database,
              `rooms/${roomCode}`
            );

          const snapshot =
            await get(roomRef);

          if (snapshot.exists()) {
            continue;
          }

          await set(
            roomRef,
            {
              hostId:
                currentUser.uid,

              status:
                "waiting",

              phase:
                "waiting",

              round:
                0,

              maxPlayers:
                4,

              createdAt:
                Date.now(),

              players: {
                [currentUser.uid]: {
                  name:
                    playerName,

                  joinedAt:
                    Date.now()
                }
              }
            }
          );

          created = true;
          break;
        }

        if (!created) {
          throw new Error(
            "無法產生房號，請再試一次。"
          );
        }

        await enterRoom(roomCode);
      } catch (error) {
        console.error(error);

        setStatus(
          homeStatus,
          `建立失敗：${error.message}`,
          "error"
        );

        setHomeButtonsDisabled(false);
      }
    }

    async function joinRoom() {
      const playerName =
        validatePlayerName();

      if (!playerName || !currentUser) {
        return;
      }

      const roomCode =
        roomCodeInput.value
          .replace(/\D/g, "")
          .slice(0, 6);

      roomCodeInput.value =
        roomCode;

      if (roomCode.length !== 6) {
        setStatus(
          homeStatus,
          "請輸入完整的六位數房號。",
          "error"
        );

        return;
      }

      setHomeButtonsDisabled(true);

      try {
        const roomRef =
          ref(
            database,
            `rooms/${roomCode}`
          );

        const roomSnapshot =
          await get(roomRef);

        if (!roomSnapshot.exists()) {
          throw new Error(
            "找不到這個房間。"
          );
        }

        const roomData =
          roomSnapshot.val();

        if (roomData.status !== "waiting") {
          throw new Error(
            "遊戲已經開始，不能中途加入。"
          );
        }

        const playersRef =
          ref(
            database,
            `rooms/${roomCode}/players`
          );

        let roomFull = false;

        const result =
          await runTransaction(
            playersRef,
            function(players) {
              const currentPlayers =
                players || {};

              if (
                currentPlayers[
                  currentUser.uid
                ]
              ) {
                currentPlayers[
                  currentUser.uid
                ].name =
                  playerName;

                return currentPlayers;
              }

              if (
                Object.keys(
                  currentPlayers
                ).length >= 4
              ) {
                roomFull = true;
                return;
              }

              currentPlayers[
                currentUser.uid
              ] = {
                name:
                  playerName,

                joinedAt:
                  Date.now()
              };

              return currentPlayers;
            }
          );

        if (!result.committed) {
          throw new Error(
            roomFull
              ? "房間已滿，最多四人。"
              : "加入失敗，請再試一次。"
          );
        }

        await enterRoom(roomCode);
      } catch (error) {
        console.error(error);

        setStatus(
          homeStatus,
          `加入失敗：${error.message}`,
          "error"
        );

        setHomeButtonsDisabled(false);
      }
    }

    async function enterRoom(roomCode) {
      currentRoomCode =
        roomCode;

      roomCodeDisplay.textContent =
        roomCode;

      if (roomUnsubscribe) {
        roomUnsubscribe();
      }

      const roomRef =
        ref(
          database,
          `rooms/${roomCode}`
        );

      roomUnsubscribe =
        onValue(
          roomRef,
          function(snapshot) {
            if (!snapshot.exists()) {
              resetToHome();
              return;
            }

            currentRoomData =
              snapshot.val();

            renderRoom(
              currentRoomData
            );
          }
        );

      const playerRef =
        ref(
          database,
          `rooms/${roomCode}/players/${currentUser.uid}`
        );

      disconnectOperation =
        onDisconnect(playerRef);

      await disconnectOperation.remove();
    }

    function renderRoom(room) {
      if (
        !room.players ||
        !room.players[currentUser.uid]
      ) {
        resetToHome();
        return;
      }

      if (room.status === "waiting") {
        renderLobby(room);
      } else {
        renderGame(room);
      }
    }

    function renderLobby(room) {
      showPage(lobbyPage);

      const players =
        getSortedPlayers(room);

      playerCount.textContent =
        `${players.length} / 4`;

      playerList.innerHTML = "";

      players.forEach(
        function([playerId, player]) {
          const item =
            document.createElement("div");

          item.className =
            "player";

          item.innerHTML = `
            <div class="player-main">
              <div class="avatar">
                ${
                  playerId === room.hostId
                    ? "👑"
                    : "🙂"
                }
              </div>

              <div>
                <span class="player-name"></span>

                ${
                  playerId === currentUser.uid
                    ? '<span class="player-you">你</span>'
                    : ""
                }
              </div>
            </div>

            ${
              playerId === room.hostId
                ? '<span class="host-badge">房主</span>'
                : ""
            }
          `;

          item
            .querySelector(".player-name")
            .textContent =
              player.name;

          playerList.appendChild(item);
        }
      );

      if (players.length < 2) {
        lobbyMessage.textContent =
          "等待至少一位朋友加入……";
      } else {
        lobbyMessage.textContent =
          "已可開始遊戲，也可以繼續等待朋友。";
      }

      if (isCurrentUserHost(room)) {
        startGameButton.classList.remove(
          "hidden"
        );

        startGameButton.disabled =
          players.length < 2;

        startGameButton.textContent =
          players.length < 2
            ? "至少需要 2 位玩家"
            : "開始遊戲";
      } else {
        startGameButton.classList.add(
          "hidden"
        );
      }
    }

    async function startGame() {
      if (
        !currentRoomData ||
        !isCurrentUserHost(currentRoomData)
      ) {
        return;
      }

      const playerIds =
        Object.keys(
          currentRoomData.players || {}
        );

      if (playerIds.length < 2) {
        return;
      }

      startGameButton.disabled = true;

      try {
        const selectedPair =
          getRandomItem(wordPairs);

        const undercoverId =
          getRandomItem(playerIds);

        const speakerOrder =
          shuffleArray(playerIds);

        const updates = {};

        updates[
          `rooms/${currentRoomCode}/status`
        ] = "playing";

        updates[
          `rooms/${currentRoomCode}/phase`
        ] = "reveal";

        updates[
          `rooms/${currentRoomCode}/round`
        ] =
          (currentRoomData.round || 0) + 1;

        updates[
          `rooms/${currentRoomCode}/undercoverId`
        ] = undercoverId;

        updates[
          `rooms/${currentRoomCode}/civilianWord`
        ] = selectedPair[0];

        updates[
          `rooms/${currentRoomCode}/undercoverWord`
        ] = selectedPair[1];

        updates[
          `rooms/${currentRoomCode}/speakerOrder`
        ] = speakerOrder;

        updates[
          `rooms/${currentRoomCode}/speakerIndex`
        ] = 0;

        updates[
          `rooms/${currentRoomCode}/eligibleVoteIds`
        ] = null;

        updates[
          `rooms/${currentRoomCode}/result`
        ] = null;

        playerIds.forEach(
          function(playerId) {
            const isUndercover =
              playerId === undercoverId;

            updates[
              `rooms/${currentRoomCode}/players/${playerId}/role`
            ] =
              isUndercover
                ? "undercover"
                : "civilian";

            updates[
              `rooms/${currentRoomCode}/players/${playerId}/word`
            ] =
              isUndercover
                ? selectedPair[1]
                : selectedPair[0];

            updates[
              `rooms/${currentRoomCode}/players/${playerId}/ready`
            ] = false;

            updates[
              `rooms/${currentRoomCode}/players/${playerId}/vote`
            ] = null;
          }
        );

        await update(
          ref(database),
          updates
        );
      } catch (error) {
        console.error(error);

        setStatus(
          lobbyStatus,
          `開始失敗：${error.message}`,
          "error"
        );

        startGameButton.disabled = false;
      }
    }

    function renderGame(room) {
      showPage(gamePage);

      roundLabel.textContent =
        `第 ${room.round || 1} 局`;

      const phase =
        room.phase || "reveal";

      if (phase === "reveal") {
        renderRevealPhase(room);
      } else if (phase === "discussion") {
        renderDiscussionPhase(room);
      } else if (phase === "voting") {
        renderVotingPhase(room);
      } else if (phase === "tie") {
        renderTiePhase(room);
      } else if (phase === "result") {
        renderResultPhase(room);
      }
    }

function renderRevealPhase(room) {
  showGamePhase(revealPhase);

  gameTitle.textContent =
    "查看你的秘密詞語";

  gameSubtitle.textContent =
    "請自己看，不要讓其他玩家看到你的內容。";

  const players =
    Object.values(room.players || {});

  const currentPlayer =
    room.players[currentUser.uid];

  if (!currentPlayer) {
    setStatus(
      gameStatus,
      "找不到你的玩家資料，請重新加入房間。",
      "error"
    );

    return;
  }

  const readyCount =
    players.filter(
      function(player) {
        return player.ready === true;
      }
    ).length;

  readyStatus.textContent =
    `${readyCount} / ${players.length} 位玩家已看完`;

  /*
    強制顯示按鈕。
    房主和一般玩家都必須確認看完。
  */
  readyButton.classList.remove("hidden");

  const hasReadied =
    currentPlayer.ready === true;

  readyButton.disabled =
    hasReadied;

  readyButton.textContent =
    hasReadied
      ? "已確認，等待其他玩家"
      : "我已經看完了";

  if (secretVisible) {
    showSecretResult(currentPlayer);
  } else {
    showSecretCover();
  }

  /*
    所有人都按下確認後，
    才由房主切換到描述階段。
  */
  if (
    readyCount === players.length &&
    players.length >= 2 &&
    isCurrentUserHost(room)
  ) {
    beginDiscussion();
  }
}

    function showSecretCover() {
      secretVisible = false;

      secretCard.classList.add(
        "clickable"
      );

      secretCover.classList.remove(
        "hidden"
      );

      secretResult.classList.add(
        "hidden"
      );

      hideSecretButton.classList.add(
        "hidden"
      );
    }

    function showSecretResult(player) {
      secretVisible = true;

      secretCard.classList.remove(
        "clickable"
      );

      secretCover.classList.add(
        "hidden"
      );

      secretResult.classList.remove(
        "hidden"
      );

      hideSecretButton.classList.remove(
        "hidden"
      );

      const undercover =
        player.role === "undercover";

      roleName.textContent =
        undercover
          ? "你是臥底"
          : "你是平民";

      roleName.className =
        `role-name ${
          undercover
            ? "undercover"
            : "civilian"
        }`;

      secretWord.textContent =
        player.word || "載入中";
    }

    async function markReady() {
      await update(
        ref(
          database,
          `rooms/${currentRoomCode}/players/${currentUser.uid}`
        ),
        {
          ready:
            true
        }
      );

      showSecretCover();
    }

    async function beginDiscussion() {
      if (
        !currentRoomData ||
        currentRoomData.phase !== "reveal"
      ) {
        return;
      }

      await update(
        ref(
          database,
          `rooms/${currentRoomCode}`
        ),
        {
          phase:
            "discussion",

          speakerIndex:
            0
        }
      );
    }

    function renderDiscussionPhase(room) {
      showGamePhase(discussionPhase);

      gameTitle.textContent =
        "描述階段";

      gameSubtitle.textContent =
        "依順序描述你的詞語，不能直接說出答案。";

      const order =
        room.speakerOrder || [];

      const index =
        room.speakerIndex || 0;

      const currentSpeakerId =
        order[index];

      speakerName.textContent =
        getPlayerDisplayName(
          room,
          currentSpeakerId
        );

      speakerPosition.textContent =
        `第 ${index + 1} 位，共 ${order.length} 位`;

      speakerOrderList.innerHTML = "";

      order.forEach(
        function(playerId, orderIndex) {
          const item =
            document.createElement("span");

          item.className =
            `order-item ${
              orderIndex === index
                ? "active"
                : ""
            }`;

          item.textContent =
            `${orderIndex + 1}. ${
              getPlayerDisplayName(
                room,
                playerId
              )
            }`;

          speakerOrderList.appendChild(item);
        }
      );

      const isHost =
        isCurrentUserHost(room);

      if (
        isHost &&
        index < order.length - 1
      ) {
        nextSpeakerButton.classList.remove(
          "hidden"
        );

        startVoteButton.classList.add(
          "hidden"
        );
      } else if (
        isHost &&
        index >= order.length - 1
      ) {
        nextSpeakerButton.classList.add(
          "hidden"
        );

        startVoteButton.classList.remove(
          "hidden"
        );
      } else {
        nextSpeakerButton.classList.add(
          "hidden"
        );

        startVoteButton.classList.add(
          "hidden"
        );
      }
    }

    async function nextSpeaker() {
      const order =
        currentRoomData.speakerOrder || [];

      const currentIndex =
        currentRoomData.speakerIndex || 0;

      if (
        currentIndex >= order.length - 1
      ) {
        return;
      }

      await update(
        ref(
          database,
          `rooms/${currentRoomCode}`
        ),
        {
          speakerIndex:
            currentIndex + 1
        }
      );
    }

    async function beginVoting() {
      const updates = {
        phase:
          "voting",

        eligibleVoteIds:
          null
      };

      Object.keys(
        currentRoomData.players || {}
      ).forEach(
        function(playerId) {
          updates[
            `players/${playerId}/vote`
          ] = null;
        }
      );

      await update(
        ref(
          database,
          `rooms/${currentRoomCode}`
        ),
        updates
      );
    }

    function renderVotingPhase(room) {
      showGamePhase(votingPhase);

      gameTitle.textContent =
        "投票時間";

      gameSubtitle.textContent =
        "選出你認為是臥底的人。友情通常活不過這個階段。";

      const players =
        room.players || {};

      const currentPlayer =
        players[currentUser.uid];

      const allPlayerIds =
        Object.keys(players);

      const eligibleIds =
        room.eligibleVoteIds
          ? Object.values(
              room.eligibleVoteIds
            )
          : allPlayerIds;

      const candidates =
        eligibleIds.filter(
          playerId =>
            playerId !== currentUser.uid
        );

      voteInstruction.textContent =
        room.eligibleVoteIds
          ? "平票重投：只能從平票玩家中選擇。"
          : "選出你認為是臥底的玩家。";

      voteList.innerHTML = "";

      candidates.forEach(
        function(playerId) {
          const button =
            document.createElement("button");

          button.type =
            "button";

          button.className =
            "vote-button";

          if (
            currentPlayer.vote === playerId
          ) {
            button.classList.add(
              "selected"
            );
          }

          button.disabled =
            Boolean(currentPlayer.vote);

          button.innerHTML = `
            <span>
              ${
                getPlayerDisplayName(
                  room,
                  playerId
                )
              }
            </span>

            <span>
              ${
                currentPlayer.vote === playerId
                  ? "已投票"
                  : "選擇"
              }
            </span>
          `;

          button.addEventListener(
            "click",
            function() {
              submitVote(playerId);
            }
          );

          voteList.appendChild(button);
        }
      );

      const voteCount =
        allPlayerIds.filter(
          playerId =>
            Boolean(players[playerId].vote)
        ).length;

      voteStatus.textContent =
        `${voteCount} / ${allPlayerIds.length} 位玩家已投票`;

      if (
        voteCount === allPlayerIds.length &&
        isCurrentUserHost(room)
      ) {
        finalizeVote(room);
      }
    }

    async function submitVote(targetId) {
      const currentPlayer =
        currentRoomData.players[
          currentUser.uid
        ];

      if (currentPlayer.vote) {
        return;
      }

      await update(
        ref(
          database,
          `rooms/${currentRoomCode}/players/${currentUser.uid}`
        ),
        {
          vote:
            targetId
        }
      );
    }

    async function finalizeVote(room) {
      if (voteFinalizing) {
        return;
      }

      voteFinalizing = true;

      try {
        const lockRef =
          ref(
            database,
            `rooms/${currentRoomCode}/voteFinalized`
          );

        const lockResult =
          await runTransaction(
            lockRef,
            function(value) {
              if (value === true) {
                return;
              }

              return true;
            }
          );

        if (!lockResult.committed) {
          return;
        }

        const voteCounts = {};

        Object.values(
          room.players || {}
        ).forEach(
          function(player) {
            if (!player.vote) {
              return;
            }

            voteCounts[player.vote] =
              (voteCounts[player.vote] || 0) + 1;
          }
        );

        const highestVote =
          Math.max(
            ...Object.values(voteCounts)
          );

        const highestIds =
          Object.keys(voteCounts)
            .filter(
              playerId =>
                voteCounts[playerId] ===
                highestVote
            );

        if (highestIds.length > 1) {
          await update(
            ref(
              database,
              `rooms/${currentRoomCode}`
            ),
            {
              phase:
                "tie",

              tieIds:
                highestIds,

              voteFinalized:
                false
            }
          );

          return;
        }

        const eliminatedId =
          highestIds[0];

        const civiliansWin =
          eliminatedId ===
          room.undercoverId;

        await update(
          ref(
            database,
            `rooms/${currentRoomCode}`
          ),
          {
            phase:
              "result",

            voteFinalized:
              false,

            result: {
              eliminatedId:
                eliminatedId,

              winner:
                civiliansWin
                  ? "civilian"
                  : "undercover"
            }
          }
        );
      } catch (error) {
        console.error(error);

        await update(
          ref(
            database,
            `rooms/${currentRoomCode}`
          ),
          {
            voteFinalized:
              false
          }
        );
      } finally {
        voteFinalizing = false;
      }
    }

    function renderTiePhase(room) {
      showGamePhase(tiePhase);

      gameTitle.textContent =
        "平票";

      gameSubtitle.textContent =
        "大家很有默契地沒有解決任何事情。";

      const tieIds =
        room.tieIds || [];

      const names =
        tieIds.map(
          playerId =>
            getPlayerDisplayName(
              room,
              playerId
            )
        );

      tieDescription.textContent =
        `${names.join("、")} 得票相同，需要重新投票。`;

      if (isCurrentUserHost(room)) {
        revoteButton.classList.remove(
          "hidden"
        );
      } else {
        revoteButton.classList.add(
          "hidden"
        );
      }
    }

    async function beginRevote() {
      const tieIds =
        currentRoomData.tieIds || [];

      const updates = {
        phase:
          "voting",

        eligibleVoteIds:
          tieIds,

        tieIds:
          null,

        voteFinalized:
          false
      };

      Object.keys(
        currentRoomData.players || {}
      ).forEach(
        function(playerId) {
          updates[
            `players/${playerId}/vote`
          ] = null;
        }
      );

      await update(
        ref(
          database,
          `rooms/${currentRoomCode}`
        ),
        updates
      );
    }

    function renderResultPhase(room) {
      showGamePhase(resultPhase);

      gameTitle.textContent =
        "本局結果";

      gameSubtitle.textContent =
        "真相終於出現，友情是否還在則不保證。";

      const result =
        room.result || {};

      const civiliansWin =
        result.winner === "civilian";

      resultIcon.textContent =
        civiliansWin
          ? "🎉"
          : "🕵️";

      resultTitle.textContent =
        civiliansWin
          ? "平民獲勝"
          : "臥底獲勝";

      const eliminatedName =
        getPlayerDisplayName(
          room,
          result.eliminatedId
        );

      resultSubtitle.textContent =
        civiliansWin
          ? `${eliminatedName} 被成功找出。`
          : `${eliminatedName} 被淘汰，但他不是臥底。`;

      undercoverName.textContent =
        getPlayerDisplayName(
          room,
          room.undercoverId
        );

      wordReveal.textContent =
        `平民詞：${room.civilianWord}｜臥底詞：${room.undercoverWord}`;

      if (isCurrentUserHost(room)) {
        playAgainButton.classList.remove(
          "hidden"
        );
      } else {
        playAgainButton.classList.add(
          "hidden"
        );
      }
    }

    async function playAgain() {
      const updates = {
        status:
          "waiting",

        phase:
          "waiting",

        undercoverId:
          null,

        civilianWord:
          null,

        undercoverWord:
          null,

        speakerOrder:
          null,

        speakerIndex:
          null,

        eligibleVoteIds:
          null,

        tieIds:
          null,

        result:
          null,

        voteFinalized:
          false
      };

      Object.keys(
        currentRoomData.players || {}
      ).forEach(
        function(playerId) {
          updates[
            `players/${playerId}/role`
          ] = null;

          updates[
            `players/${playerId}/word`
          ] = null;

          updates[
            `players/${playerId}/ready`
          ] = null;

          updates[
            `players/${playerId}/vote`
          ] = null;
        }
      );

      secretVisible = false;

      await update(
        ref(
          database,
          `rooms/${currentRoomCode}`
        ),
        updates
      );
    }

    async function leaveRoom() {
      if (
        !currentRoomCode ||
        !currentUser
      ) {
        return;
      }

      try {
        if (disconnectOperation) {
          await disconnectOperation.cancel();
        }

        const roomRef =
          ref(
            database,
            `rooms/${currentRoomCode}`
          );

        const roomSnapshot =
          await get(roomRef);

        if (roomSnapshot.exists()) {
          const room =
            roomSnapshot.val();

          await remove(
            ref(
              database,
              `rooms/${currentRoomCode}/players/${currentUser.uid}`
            )
          );

          if (
            room.hostId === currentUser.uid
          ) {
            const latest =
              await get(roomRef);

            if (latest.exists()) {
              const remainingPlayers =
                getSortedPlayers(
                  latest.val()
                );

              if (
                remainingPlayers.length === 0
              ) {
                await remove(roomRef);
              } else {
                await update(
                  roomRef,
                  {
                    hostId:
                      remainingPlayers[0][0]
                  }
                );
              }
            }
          }
        }
      } catch (error) {
        console.error(error);
      } finally {
        resetToHome();
      }
    }

    function resetToHome() {
      if (roomUnsubscribe) {
        roomUnsubscribe();
        roomUnsubscribe = null;
      }

      currentRoomCode = null;
      currentRoomData = null;
      disconnectOperation = null;
      secretVisible = false;
      voteFinalizing = false;

      roomCodeInput.value = "";
      playerList.innerHTML = "";
      voteList.innerHTML = "";

      showPage(homePage);

      setHomeButtonsDisabled(false);

      setStatus(
        homeStatus,
        "連線成功，可以建立或加入房間。",
        "success"
      );
    }

    async function copyRoomCode() {
      if (!currentRoomCode) {
        return;
      }

      try {
        await navigator.clipboard.writeText(
          currentRoomCode
        );

        copyRoomButton.textContent =
          "已複製";

        setTimeout(
          function() {
            copyRoomButton.textContent =
              "複製房號";
          },
          1500
        );
      } catch (error) {
        setStatus(
          lobbyStatus,
          `房號：${currentRoomCode}`,
          "success"
        );
      }
    }

    roomCodeInput.addEventListener(
      "input",
      function() {
        roomCodeInput.value =
          roomCodeInput.value
            .replace(/\D/g, "")
            .slice(0, 6);
      }
    );

    createRoomButton.addEventListener(
      "click",
      createRoom
    );

    joinRoomButton.addEventListener(
      "click",
      joinRoom
    );

    startGameButton.addEventListener(
      "click",
      startGame
    );

    leaveRoomButton.addEventListener(
      "click",
      leaveRoom
    );

    gameLeaveButton.addEventListener(
      "click",
      leaveRoom
    );

    copyRoomButton.addEventListener(
      "click",
      copyRoomCode
    );

    secretCard.addEventListener(
      "click",
      function() {
        if (
          !secretCard.classList.contains(
            "clickable"
          )
        ) {
          return;
        }

        const player =
          currentRoomData.players[
            currentUser.uid
          ];

        showSecretResult(player);
      }
    );

    hideSecretButton.addEventListener(
      "click",
      showSecretCover
    );

    readyButton.addEventListener(
      "click",
      markReady
    );

    nextSpeakerButton.addEventListener(
      "click",
      nextSpeaker
    );

    startVoteButton.addEventListener(
      "click",
      beginVoting
    );

    revoteButton.addEventListener(
      "click",
      beginRevote
    );

    playAgainButton.addEventListener(
      "click",
      playAgain
    );

    setHomeButtonsDisabled(true);

    initializeAuthentication();
  </script>
</body>
</html>
